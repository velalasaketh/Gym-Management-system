<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced GYM Management System</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-dumbbell"></i>
                <h1>GYM Management System</h1>
                <p>Advanced Fitness Center Management</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user-shield"></i> Role</label>
                    <select id="loginRole" required>
                        <option value="admin">Admin</option>
                        <option value="trainer">Trainer</option>
                        <option value="member">Member</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <p class="demo-text">
                <i class="fas fa-info-circle"></i> Demo: Use any username/password
            </p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp" class="hidden">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="logo-section">
                    <i class="fas fa-dumbbell"></i>
                    <h1>GYM Management</h1>
                </div>
                <div class="header-right">
                    <span id="currentDateTime" class="datetime">
                        <i class="far fa-clock"></i> <span id="dateTime"></span>
                    </span>
                    <span id="userInfo" class="user-info">
                        <i class="fas fa-user-circle"></i> Welcome, User
                    </span>
                    <button id="logoutBtn" class="btn btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <div class="container main-content">
            <div class="layout">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <nav id="sidebarNav"></nav>
                </aside>

                <!-- Main Content Area -->
                <main class="content" id="mainContent">
                    <!-- Dynamic content loaded here -->
                </main>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Modal</h2>
                <button type="button" id="modalClose" class="modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="modalForm">
                <div id="modalFields"></div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 id="confirmTitle">Confirm Action</h2>
                <button type="button" class="modal-close" onclick="closeConfirmModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-actions">
                <button type="button" id="confirmYes" class="btn btn-danger">
                    <i class="fas fa-check"></i> Yes
                </button>
                <button type="button" class="btn btn-secondary" onclick="closeConfirmModal()">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
